---
- name: Install Grafana
  hosts: sled-01
  become: true

  tasks:
    - name: Download Grafana ARM64 package
      get_url:
        url: https://dl.grafana.com/oss/release/grafana_12.2.0_arm64.deb
        dest: /tmp/grafana.deb

    - name: Install Grafana
      apt:
        deb: /tmp/grafana.deb

    - name: Enable Grafana
      systemd:
        name: grafana-server
        enabled: yes
        state: started
