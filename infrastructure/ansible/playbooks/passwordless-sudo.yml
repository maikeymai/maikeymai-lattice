---
- name: Configure passwordless sudo
  hosts: lattice
  become: true

  tasks:
    - name: Create sudoers file for michael
      copy:
        dest: /etc/sudoers.d/michael
        content: |
          michael ALL=(ALL) NOPASSWD: ALL
        owner: root
        group: root
        mode: '0440'

    - name: Validate sudoers file
      command: visudo -cf /etc/sudoers.d/michael
      changed_when: false
