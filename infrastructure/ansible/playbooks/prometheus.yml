---
- name: Install Prometheus on sled-01
  hosts: sled-01
  become: true

  tasks:
    - name: Create prometheus user
      user:
        name: prometheus
        shell: /usr/sbin/nologin
        system: yes

    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: '0755'
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download Prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v3.7.3/prometheus-3.7.3.linux-arm64.tar.gz
        dest: /tmp/prometheus.tar.gz

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp
        remote_src: yes

    - name: Install binaries
      copy:
        src: "/tmp/prometheus-3.7.3.linux-arm64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        remote_src: yes
        owner: root
        group: root
        mode: '0755'
      loop:
        - prometheus
        - promtool


    - name: Create Prometheus config
      copy:
        dest: /etc/prometheus/prometheus.yml
        owner: prometheus
        group: prometheus
        mode: '0644'
        content: |
          global:
            scrape_interval: 15s

          scrape_configs:
            - job_name: "lattice-nodes"
              static_configs:
                - targets:
                    - "192.168.68.101:9100"
                    - "192.168.68.102:9100"
                    - "192.168.68.103:9100"
                    - "192.168.68.104:9100"
                    - "192.168.68.105:9100"
                    - "192.168.68.106:9100"

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=prometheus
          Group=prometheus
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus \
            --web.listen-address=0.0.0.0:9090

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Start Prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: restarted
